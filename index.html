<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Boring Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="nav">
        <p class="heading">The Boring Page</p>
    </div>
    <div class="main">
        <div class="card-container">
            <div class="card">
                <img src="gallery/activity_img1.jpg" alt="activity_img">
                <button id="activity">Random Activity</button>
            </div>
            <div class="card">
                <img src="gallery/cat_img1.jpeg" alt="cat_img">
                <button id="cat-fact">Random Cat Fact</button>
            </div>
            <div class="card">
                <img src="gallery/fact_img2.jpg" alt="fact_img">
                <button id="random-fact">Random Facts</button>
            </div>
            <div class="card">
                <img src="gallery/Programming_Jokes-img.jpg" alt="Pgm_joke_img">
                <button id="jokes">Random Jokes</button>
            </div>
        </div>

    </div>
    <div class="output-container">
        <div class="card">
            <p class="heading">heading</p>
            <p class="first-line mt"></p>
            <p class="second-line"></p>
            <div class="btn-container">
                <button id="back-btn" class="back-btn"><i class="fa-regular fa-circle-xmark"></i></button>
                <button class="more-btn">Next <i class="fa-solid fa-arrow-right-long"></i></button>
            </div>

        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
